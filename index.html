<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>🖤 Paris</title>

  <style>
    :root{
      --bg:#07070a;
      --bg2:#0b0b10;
      --card:rgba(18,18,26,0.86);
      --border:rgba(255,255,255,0.08);
      --text:#f5f5f7;
      --muted:rgba(245,245,247,0.72);
      --rose:#ff2f6d;
      --rose2:#ff5a8a;
      --gold:#f7d57a;
    }

    *{ box-sizing:border-box; }
    body{
      margin:0;
      min-height:100vh;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background:
        radial-gradient(circle at 15% 20%, rgba(255,47,109,0.12), transparent 45%),
        radial-gradient(circle at 85% 15%, rgba(247,213,122,0.10), transparent 45%),
        radial-gradient(circle at 80% 85%, rgba(255,90,138,0.10), transparent 50%),
        linear-gradient(180deg, var(--bg), var(--bg2));
      color:var(--text);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:18px;
    }

    .card{
      width:min(760px, 100%);
      background: var(--card);
      border:1px solid var(--border);
      border-radius:22px;
      padding:22px;
      box-shadow: 0 18px 60px rgba(0,0,0,0.55);
      position:relative;
      overflow:hidden;
      backdrop-filter: blur(10px);
    }

    /* subtle rose pattern */
    .card::before{
      content:"";
      position:absolute;
      inset:-80px;
      background:
        radial-gradient(circle at 20% 20%, rgba(255,47,109,0.14), transparent 35%),
        radial-gradient(circle at 60% 40%, rgba(255,90,138,0.10), transparent 40%),
        radial-gradient(circle at 85% 70%, rgba(247,213,122,0.08), transparent 45%);
      filter: blur(1px);
      pointer-events:none;
    }

    .top{
      position:relative;
      display:grid;
      grid-template-columns: 90px 1fr 90px;
      align-items:center;
      gap:10px;
      margin-bottom:12px;
      z-index:2;
    }

    .bubble{
      width:76px;
      height:76px;
      border-radius:999px;
      display:grid;
      place-items:center;
      background: rgba(255,255,255,0.06);
      border:1px solid rgba(255,255,255,0.10);
      box-shadow: 0 14px 24px rgba(0,0,0,0.25);
      font-size:34px;
      user-select:none;
    }

    .title-wrap{
      text-align:center;
      line-height:1.15;
      padding:0 6px;
    }

    h1{
      margin:0;
      font-size:22px;
      font-weight:900;
      letter-spacing:-0.4px;
    }

    .subtitle{
      margin:8px 0 0 0;
      color:var(--muted);
      font-size:14px;
    }

    .yes-area{
      position:relative;
      z-index:2;
      margin-top:14px;
      border-radius:18px;
      background: rgba(255,255,255,0.04);
      border:1px dashed rgba(255,255,255,0.14);
      padding:14px;
      min-height:290px;
      overflow:hidden;
    }

    .yes-btn{
      appearance:none;
      border:none;
      background: linear-gradient(135deg, var(--rose), var(--rose2));
      color:white;
      font-weight:900;
      padding:10px 16px;
      border-radius:999px;
      cursor:pointer;
      box-shadow: 0 14px 28px rgba(255,47,109,0.22);
      user-select:none;
      position:absolute;
      animation: bob 2.8s ease-in-out infinite;
      will-change:left, top, transform;
    }
    @keyframes bob{
      0%{ transform: translateY(0); }
      50%{ transform: translateY(-10px); }
      100%{ transform: translateY(0); }
    }

    /* tiny NO, always visible, never clickable */
    .no-tiny{
      position:absolute;
      font-size:11px;
      opacity:0.55;
      padding:6px 8px;
      border-radius:10px;
      border:1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.06);
      pointer-events:none;
      user-select:none;
      color: rgba(245,245,247,0.75);
      z-index:5;
    }

    .screen{ display:none; }
    .screen.active{ display:block; }

    video{
      width:100%;
      max-height:460px;
      border-radius:18px;
      border:1px solid rgba(255,255,255,0.10);
      background:#000;
    }

    .confetti-layer{
      position:absolute;
      inset:-20px;
      pointer-events:none;
      overflow:hidden;
      border-radius:22px;
      z-index:50;
    }

    .confetti-heart{
      position:absolute;
      top:-40px;
      opacity:0.95;
      will-change: transform, opacity;
      filter: drop-shadow(0 10px 12px rgba(0,0,0,0.35));
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="confetti-layer" id="confetti"></div>

    <!-- SCREEN 1 -->
    <div id="screen1" class="screen active">
      <div class="top">
        <div class="bubble" aria-hidden="true">🌹</div>

        <div class="title-wrap">
          <h1 id="question">Paris, Will You Marry Me?</h1>
          <p class="subtitle">Just tap “YES” 🖤</p>
        </div>

        <div class="bubble" aria-hidden="true">🍓</div>
      </div>

      <div class="yes-area" id="yesArea">
        <div class="no-tiny" id="noTiny">no</div>
      </div>
    </div>

    <!-- SCREEN 2 -->
    <div id="screen2" class="screen">
      <div class="top">
        <div class="bubble" aria-hidden="true">🌹</div>
        <div class="title-wrap">
          <h1>It’s you. Always. 💍</h1>
          <p class="subtitle">Forever starts now.</p>
        </div>
        <div class="bubble" aria-hidden="true">🍓</div>
      </div>

      <video id="vid" controls autoplay playsinline>
        <source src="proposal.mp4" type="video/mp4" />
        Your browser does not support the video tag.
      </video>
    </div>
  </div>

  <script>
    const HER_NAME = "Paris";
    const YES_COUNT = 30;

    document.getElementById("question").textContent = `${HER_NAME}, Will You Marry Me?`;

    const yesArea = document.getElementById("yesArea");
    const noTiny  = document.getElementById("noTiny");
    const confetti = document.getElementById("confetti");
    const buttons = [];

    function rand(min, max){ return Math.random() * (max - min) + min; }

    // ---------- YES buttons drift ----------
    function placeButtons(){
      yesArea.querySelectorAll(".yes-btn").forEach(b => b.remove());
      buttons.length = 0;

      const rect = yesArea.getBoundingClientRect();
      const padding = 14;

      for(let i=0;i<YES_COUNT;i++){
        const btn = document.createElement("button");
        btn.className = "yes-btn";
        btn.textContent = "YES";

        btn.style.animationDuration = `${rand(2.2, 4.2).toFixed(2)}s`;
        btn.style.animationDelay = `${rand(0, 1.2).toFixed(2)}s`;

        yesArea.appendChild(btn);

        const bw = btn.offsetWidth;
        const bh = btn.offsetHeight;

        const maxLeft = Math.max(padding, rect.width - bw - padding);
        const maxTop  = Math.max(padding, rect.height - bh - padding);

        const x = rand(padding, maxLeft);
        const y = rand(padding, maxTop);

        btn.style.left = x + "px";
        btn.style.top  = y + "px";

        const speed = rand(0.25, 0.65);
        const angle = rand(0, Math.PI * 2);
        const vx = Math.cos(angle) * speed;
        const vy = Math.sin(angle) * speed;

        buttons.push({ el: btn, x, y, vx, vy, bw, bh });
        btn.addEventListener("click", () => goToVideo());
      }
    }

    function animateButtons(){
      const rect = yesArea.getBoundingClientRect();
      const padding = 14;

      for(const b of buttons){
        b.bw = b.el.offsetWidth;
        b.bh = b.el.offsetHeight;

        const minX = padding;
        const minY = padding;
        const maxX = rect.width - b.bw - padding;
        const maxY = rect.height - b.bh - padding;

        b.x += b.vx;
        b.y += b.vy;

        if (b.x <= minX) { b.x = minX; b.vx *= -1; }
        if (b.x >= maxX) { b.x = maxX; b.vx *= -1; }
        if (b.y <= minY) { b.y = minY; b.vy *= -1; }
        if (b.y >= maxY) { b.y = maxY; b.vy *= -1; }

        b.el.style.left = b.x + "px";
        b.el.style.top  = b.y + "px";
      }
      requestAnimationFrame(animateButtons);
    }

    // ---------- NO dodges but stays visible ----------
    let noX = 0, noY = 0;

    function setNoStart(){
      const rect = yesArea.getBoundingClientRect();
      const elW = noTiny.offsetWidth || 24;
      const elH = noTiny.offsetHeight || 18;
      noX = rect.width - elW - 14;
      noY = rect.height - elH - 12;
      noTiny.style.left = noX + "px";
      noTiny.style.top  = noY + "px";
    }

    function clamp(v, min, max){ return Math.max(min, Math.min(max, v)); }

    yesArea.addEventListener("mousemove", (e) => {
      const rect = yesArea.getBoundingClientRect();
      const mx = e.clientX - rect.left;
      const my = e.clientY - rect.top;

      const elW = noTiny.offsetWidth;
      const elH = noTiny.offsetHeight;

      const nx = noX + elW/2;
      const ny = noY + elH/2;

      const dx = nx - mx;
      const dy = ny - my;
      const dist = Math.hypot(dx, dy);

      const threshold = 95;
      if(dist < threshold){
        const push = (threshold - dist) / threshold;
        const dirX = dx / (dist || 1);
        const dirY = dy / (dist || 1);

        noX += dirX * (20 + 38 * push);
        noY += dirY * (20 + 38 * push);

        const minX = 10;
        const minY = 10;
        const maxX = rect.width - elW - 10;
        const maxY = rect.height - elH - 10;

        noX = clamp(noX, minX, maxX);
        noY = clamp(noY, minY, maxY);

        noTiny.style.left = noX + "px";
        noTiny.style.top  = noY + "px";
      }
    });

    // ---------- confetti rain on video start ----------
    function startConfettiRain(durationMs = 5200){
      const start = Date.now();
      confetti.innerHTML = "";

      function spawn(){
        if(Date.now() - start > durationMs) return;

        const card = document.querySelector(".card");
        const cRect = card.getBoundingClientRect();
        const batch = 7;

        for(let i=0;i<batch;i++){
          const h = document.createElement("div");
          h.className = "confetti-heart";
          h.textContent = "🖤";

          const x = rand(0, cRect.width - 10);
          const size = rand(14, 28);
          const fallMs = rand(1400, 2600);
          const drift = rand(-90, 90);
          const rot = rand(160, 340);

          h.style.left = x + "px";
          h.style.fontSize = size + "px";

          h.animate(
            [
              { transform: `translate(${drift*0.15}px, -20px) rotate(0deg)`, opacity: 0 },
              { opacity: 1, offset: 0.12 },
              { transform: `translate(${drift}px, 560px) rotate(${rot}deg)`, opacity: 0 }
            ],
            { duration: fallMs, easing: "linear", fill: "forwards" }
          );

          confetti.appendChild(h);
          setTimeout(() => h.remove(), fallMs + 50);
        }

        requestAnimationFrame(spawn);
      }
      spawn();
    }

    function goToVideo(){
      document.getElementById("screen1").classList.remove("active");
      document.getElementById("screen2").classList.add("active");
      startConfettiRain(6000);
      const v = document.getElementById("vid");
      v.play().catch(()=>{});
    }

    // init
    placeButtons();
    setNoStart();
    requestAnimationFrame(animateButtons);
    window.addEventListener("resize", () => {
      placeButtons();
      setNoStart();
    });
  </script>
</body>
</html>
